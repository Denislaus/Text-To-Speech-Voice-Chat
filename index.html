<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroPass Voice</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="bg-shape shape-blue"></div>
    <div class="bg-shape shape-purple"></div>

    <div class="app-container">
        <header>
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>Voice<span class="highlight">Synth</span></h1>
            </div>
            <div id="status-badge" class="badge loading">Loading Model...</div>
        </header>

        <main>
            <div class="controls-row">
                <div class="input-group">
                    <label for="language-select">Language</label>
                    <select id="language-select" disabled>
                        <option>Loading...</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="voice-select">Voice Model</label>
                    <select id="voice-select" disabled>
                        <option>Loading...</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="text-input">Synthesis Text</label>
                <textarea id="text-input" placeholder="Type your message here..." disabled></textarea>
            </div>

            <div class="action-row">
                <button id="speak-btn" class="btn-primary" disabled>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <span class="btn-text">Synthesize Speech</span>
                    <span class="loader hidden"></span>
                </button>
            </div>
        </main>

        <footer>
            <p id="device-info">Waiting for backend connection...</p>
        </footer>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
